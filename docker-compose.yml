services:
  php:
    build: .
    container_name: php-estudos-php
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql
    networks:
      - php-estudos-network

  nginx:
    image: nginx:latest
    container_name: php-estudos-nginx
    ports:
      - "8002:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - php-estudos-network

  mysql:
    image: mysql:8.0
    container_name: php-estudos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: todolist
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/database/create_tasks_table.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - php-estudos-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: php-estudos-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - php-estudos-network

networks:
  php-estudos-network:
    driver: bridge

volumes:
  mysql_data:
